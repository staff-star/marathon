<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { font-family: sans-serif; padding: 16px; }
      .row { margin-bottom: 12px; }
      .message { font-size: 12px; color: #555; }
      button { padding: 8px 14px; }
      #status { margin-top: 12px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="row"><strong><?= title ?></strong></div>
    <div class="row">
      <input id="file" type="file" accept=".csv,text/csv">
    </div>
    <div class="row message">UTF-8 / Shift_JIS を自動判定して取り込みます。</div>
    <div class="row">
      <button onclick="submitFile()">取り込む</button>
    </div>
    <div id="status"></div>
    <script>
      function submitFile() {
        var file = document.getElementById('file').files[0];
        if (!file) {
          setStatus('CSV ファイルを選択してください。', true);
          return;
        }
        var reader = new FileReader();
        reader.onload = function (event) {
          google.script.run
            .withSuccessHandler(function (result) {
              setStatus(result.message, false);
              setTimeout(function () { google.script.host.close(); }, 800);
            })
            .withFailureHandler(function (error) {
              setStatus(error.message || String(error), true);
            })
            .importCsvFileFromDialog({
              target: '<?= target ?>',
              fileName: file.name,
              base64: event.target.result
            });
        };
        reader.readAsDataURL(file);
        setStatus('取り込み中です...', false);
      }

      function setStatus(message, isError) {
        var el = document.getElementById('status');
        el.textContent = message || '';
        el.style.color = isError ? '#b00020' : '#333';
      }
    </script>
  </body>
</html>
