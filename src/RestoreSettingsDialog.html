<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { font-family: sans-serif; padding: 16px; }
      label { display: block; margin: 12px 0 4px; }
      input { width: 100%; box-sizing: border-box; padding: 8px; }
      .meta { margin-top: 12px; font-size: 12px; color: #555; }
      button { margin-top: 16px; padding: 8px 14px; }
      #status { margin-top: 12px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div><strong>復旧設定</strong></div>
    <label for="startDate">復旧開始日</label>
    <input id="startDate" type="date">
    <label for="endDate">復旧終了日</label>
    <input id="endDate" type="date">
    <div class="meta">開始時刻: <span id="startTime"></span></div>
    <div class="meta">終了時刻: <span id="endTime"></span></div>
    <button onclick="save()">保存する</button>
    <div id="status"></div>
    <script>
      var payload = <?= JSON.stringify(payload) ?>;
      document.getElementById('startDate').value = payload.restoreStartDate || '';
      document.getElementById('endDate').value = payload.restoreEndDate || '';
      document.getElementById('startTime').textContent = payload.restoreStartTime || '';
      document.getElementById('endTime').textContent = payload.restoreEndTime || '';

      function save() {
        google.script.run
          .withSuccessHandler(function (result) {
            setStatus(result.message, false);
            setTimeout(function () { google.script.host.close(); }, 800);
          })
          .withFailureHandler(function (error) {
            setStatus(error.message || String(error), true);
          })
          .saveRestoreSettingsFromDialog({
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value
          });
      }

      function setStatus(message, isError) {
        var el = document.getElementById('status');
        el.textContent = message || '';
        el.style.color = isError ? '#b00020' : '#333';
      }
    </script>
  </body>
</html>
