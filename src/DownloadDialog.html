<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { font-family: sans-serif; padding: 16px; }
      a { display: inline-block; margin-top: 12px; padding: 8px 14px; background: #30475E; color: #fff; text-decoration: none; border-radius: 4px; }
      .message { font-size: 12px; color: #555; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div><strong><?= fileName ?></strong></div>
    <div class="message"><?= description ?></div>
    <a id="download" download="<?= fileName ?>" href="data:text/csv;base64,<?= base64 ?>">ダウンロード</a>
    <div class="message">クリックで保存できます。ブラウザが自動保存しない場合もこのリンクを使ってください。</div>
    <script>
      setTimeout(function () {
        document.getElementById('download').click();
      }, 200);
    </script>
  </body>
</html>
