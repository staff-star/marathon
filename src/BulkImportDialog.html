<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { font-family: sans-serif; padding: 16px; }
      .row { margin-bottom: 12px; }
      label { display: block; margin-bottom: 4px; font-weight: 600; }
      input[type="file"] { width: 100%; }
      button { margin-top: 12px; padding: 8px 14px; }
      #status { margin-top: 12px; font-size: 12px; white-space: pre-wrap; }
      .message { font-size: 12px; color: #555; }
    </style>
  </head>
  <body>
    <div class="row"><strong>4つのCSVをまとめて取り込む</strong></div>
    <div class="row">
      <label for="rms">価格表示結果CSV</label>
      <input id="rms" type="file" accept=".csv,text/csv">
    </div>
    <div class="row">
      <label for="item">IRアイテムCSV</label>
      <input id="item" type="file" accept=".csv,text/csv">
    </div>
    <div class="row">
      <label for="itemsub">IRアイテムサブCSV</label>
      <input id="itemsub" type="file" accept=".csv,text/csv">
    </div>
    <div class="row">
      <label for="selection">IRセレクションCSV</label>
      <input id="selection" type="file" accept=".csv,text/csv">
    </div>
    <div class="message">選択したファイルだけを一括取込します。4つすべて選択しても構いません。</div>
    <button onclick="submitFiles()">まとめて取り込む</button>
    <div id="status"></div>
    <script>
      function toPayload(target, file) {
        return new Promise(function (resolve) {
          if (!file) {
            resolve(null);
            return;
          }
          var reader = new FileReader();
          reader.onload = function (event) {
            resolve({
              target: target,
              fileName: file.name,
              base64: event.target.result
            });
          };
          reader.readAsDataURL(file);
        });
      }

      function submitFiles() {
        Promise.all([
          toPayload('rms', document.getElementById('rms').files[0]),
          toPayload('item', document.getElementById('item').files[0]),
          toPayload('itemsub', document.getElementById('itemsub').files[0]),
          toPayload('selection', document.getElementById('selection').files[0])
        ]).then(function (payloads) {
          var filtered = payloads.filter(Boolean);
          if (!filtered.length) {
            setStatus('少なくとも1つはCSVを選択してください。', true);
            return;
          }
          setStatus('取り込み中です...', false);
          google.script.run
            .withSuccessHandler(function (result) {
              setStatus(result.message, false);
              setTimeout(function () { google.script.host.close(); }, 1200);
            })
            .withFailureHandler(function (error) {
              setStatus(error.message || String(error), true);
            })
            .importMultipleCsvFilesFromDialog(filtered);
        });
      }

      function setStatus(message, isError) {
        var el = document.getElementById('status');
        el.textContent = message || '';
        el.style.color = isError ? '#b00020' : '#333';
      }
    </script>
  </body>
</html>
